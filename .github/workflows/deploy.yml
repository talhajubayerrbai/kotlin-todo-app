    - name: Accept Android SDK licenses and install platform
      run: 'SDKMANAGER="/usr/local/lib/android/sdk/cmdline-tools/latest/bin/sdkmanager"

        yes | "$SDKMANAGER" --licenses

        "$SDKMANAGER" "platforms;android-34" "build-tools;34.0.0"

        '
    - name: Setup Gradle 8.6
      uses: gradle/actions/setup-gradle@v4
      with:
        gradle-version: '8.6'
        validate-wrappers: false
    - name: Compile Kotlin sources (lint check)
      run: gradle compileDebugKotlin
    - name: Run Android Lint (non-blocking)
      run: gradle lintDebug || echo "Lint completed (warnings may exist)"
  test:
    runs-on: ubuntu-latest
    needs:
    - lint
    env:
      ANDROID_HOME: /usr/local/lib/android/sdk
      ANDROID_SDK_ROOT: /usr/local/lib/android/sdk
    timeout-minutes: 20
    steps:
    - uses: actions/checkout@v4
    - name: Set up JDK 17
