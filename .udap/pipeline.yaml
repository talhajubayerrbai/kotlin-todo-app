version: 1
name: kotlin-todo-app
vcs: github

rollback:
  strategy: none

stages:
  - id: lint
    kind: lint
    needs: []
    timeout_minutes: 10
    steps:
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: "17"
          distribution: temurin
          cache: gradle
      - name: Grant execute permission for gradlew
        run: chmod +x gradlew
      - name: Run Android Lint
        run: ./gradlew lint
      - name: Upload Lint Report
        uses: actions/upload-artifact@v4
        with:
          name: lint-report
          path: app/build/reports/lint-results-debug.html
          if-no-files-found: warn

  - id: test
    kind: test
    needs: [lint]
    timeout_minutes: 15
    steps:
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: "17"
          distribution: temurin
          cache: gradle
      - name: Grant execute permission for gradlew
        run: chmod +x gradlew
      - name: Run Unit Tests
        run: ./gradlew test
      - name: Upload Test Results
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: app/build/reports/tests/
          if-no-files-found: warn

  - id: provision
    kind: provision
    needs: [test]
    timeout_minutes: 5
    steps:
      - name: No-op provision (CI-only project)
        run: echo "No cloud infrastructure required for this project"

  - id: configure
    kind: configure
    needs: [provision]
    timeout_minutes: 20
    steps:
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: "17"
          distribution: temurin
          cache: gradle
      - name: Grant execute permission for gradlew
        run: chmod +x gradlew
      - name: Build Debug APK
        run: ./gradlew assembleDebug
      - name: Upload Debug APK
        uses: actions/upload-artifact@v4
        with:
          name: kotlin-todo-app-debug
          path: app/build/outputs/apk/debug/app-debug.apk
          retention-days: 30

  - id: verify
    kind: verify
    needs: [configure]
    timeout_minutes: 5
    steps:
      - name: Verify APK exists
        run: |
          APK_PATH="app/build/outputs/apk/debug/app-debug.apk"
          if [ ! -f "$APK_PATH" ]; then
            echo "ERROR: Debug APK not found at $APK_PATH"
            exit 1
          fi
          echo "APK size: $(du -sh $APK_PATH | cut -f1)"
          echo "APK verified successfully"
