version: 1
name: kotlin-todo-app
vcs: github

rollback:
  strategy: none

stages:
  - id: lint
    kind: lint
    needs: []
    timeout_minutes: 20
    env:
      ANDROID_HOME: /usr/local/lib/android/sdk
      ANDROID_SDK_ROOT: /usr/local/lib/android/sdk
    steps:
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: "17"
          distribution: temurin
      - name: Accept Android SDK licenses and install platform
        run: |
          SDKMANAGER="/usr/local/lib/android/sdk/cmdline-tools/latest/bin/sdkmanager"
          yes | "$SDKMANAGER" --licenses
          "$SDKMANAGER" "platforms;android-34" "build-tools;34.0.0"
      - name: Setup Gradle 8.6
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: "8.6"
          validate-wrappers: false
      - name: Compile Kotlin sources (lint check)
        run: gradle compileDebugKotlin
      - name: Run Android Lint (non-blocking)
        run: gradle lintDebug || echo "Lint completed (warnings may exist)"

  - id: test
    kind: test
    needs: [lint]
    timeout_minutes: 20
    env:
      ANDROID_HOME: /usr/local/lib/android/sdk
      ANDROID_SDK_ROOT: /usr/local/lib/android/sdk
    steps:
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: "17"
          distribution: temurin
      - name: Accept Android SDK licenses and install platform
        run: |
          SDKMANAGER="/usr/local/lib/android/sdk/cmdline-tools/latest/bin/sdkmanager"
          yes | "$SDKMANAGER" --licenses
          "$SDKMANAGER" "platforms;android-34" "build-tools;34.0.0"
      - name: Setup Gradle 8.6
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: "8.6"
          validate-wrappers: false
      - name: Run Unit Tests
        run: gradle test
      - name: Upload Test Results
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: app/build/reports/tests/
          if-no-files-found: warn

  - id: provision
    kind: provision
    needs: [test]
    timeout_minutes: 5
    steps:
      - name: No-op provision (CI-only project)
        run: echo "No cloud infrastructure required for this project"

  - id: configure
    kind: configure
    needs: [provision]
    timeout_minutes: 25
    env:
      ANDROID_HOME: /usr/local/lib/android/sdk
      ANDROID_SDK_ROOT: /usr/local/lib/android/sdk
    steps:
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: "17"
          distribution: temurin
      - name: Accept Android SDK licenses and install platform
        run: |
          SDKMANAGER="/usr/local/lib/android/sdk/cmdline-tools/latest/bin/sdkmanager"
          yes | "$SDKMANAGER" --licenses
          "$SDKMANAGER" "platforms;android-34" "build-tools;34.0.0"
      - name: Setup Gradle 8.6
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: "8.6"
          validate-wrappers: false
      - name: Build Debug APK
        run: gradle assembleDebug
      - name: Upload Debug APK
        uses: actions/upload-artifact@v4
        with:
          name: kotlin-todo-app-debug
          path: app/build/outputs/apk/debug/app-debug.apk
          retention-days: 30

  - id: verify
    kind: verify
    needs: [configure]
    timeout_minutes: 5
    steps:
      - name: Download APK artifact
        uses: actions/download-artifact@v4
        with:
          name: kotlin-todo-app-debug
          path: apk-download
      - name: Verify APK exists
        run: |
          APK_PATH="apk-download/app-debug.apk"
          if [ ! -f "$APK_PATH" ]; then
            echo "ERROR: Debug APK not found at $APK_PATH"
            exit 1
          fi
          echo "APK size: $(du -sh $APK_PATH | cut -f1)"
          echo "Build artifact verified successfully"
          ls -lh apk-download/

pipelines:
  - id: ui-test
    stages:
      - id: provision-ec2
        kind: provision
        needs: []
        timeout_minutes: 15
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          AWS_REGION: us-east-1
          TF_VAR_project_name: ${{ secrets.PROJECT_NAME }}
          TF_VAR_ssh_public_key: ${{ secrets.SSH_PUBLIC_KEY }}
        steps:
          - name: Set up Terraform
            uses: hashicorp/setup-terraform@v3
            with:
              terraform_version: "1.7.5"
          - name: Terraform Init
            working-directory: infra/uitest
            run: |
              terraform init -input=false -reconfigure \
                -backend-config="bucket=${{ secrets.TF_STATE_BUCKET }}" \
                -backend-config="key=${{ secrets.PROJECT_NAME }}/uitest/terraform.tfstate" \
                -backend-config="region=us-east-1"
          - name: Terraform Apply (reuse existing EC2 if already up)
            working-directory: infra/uitest
            run: terraform apply -input=false -auto-approve
          - name: Get EC2 IP
            id: get_ip
            working-directory: infra/uitest
            run: |
              EC2_IP=$(terraform output -raw instance_public_ip)
              echo "ec2_ip=$EC2_IP" >> "$GITHUB_OUTPUT"
        outputs:
          ec2_ip: ${{ steps.get_ip.outputs.ec2_ip }}

      - id: run-ui-tests
        kind: custom
        needs: [provision-ec2]
        timeout_minutes: 90
        env:
          ANDROID_HOME: /usr/local/lib/android/sdk
          ANDROID_SDK_ROOT: /usr/local/lib/android/sdk
        steps:
          - name: Set up JDK 17
            uses: actions/setup-java@v4
            with:
              java-version: "17"
              distribution: temurin
          - name: Accept Android SDK licenses and install platform
            run: |
              SDKMANAGER="/usr/local/lib/android/sdk/cmdline-tools/latest/bin/sdkmanager"
              yes | "$SDKMANAGER" --licenses
              "$SDKMANAGER" "platforms;android-34" "build-tools;34.0.0"
          - name: Setup Gradle 8.6
            uses: gradle/actions/setup-gradle@v4
            with:
              gradle-version: "8.6"
              validate-wrappers: false
          - name: Build Debug APK
            run: gradle assembleDebug
          - name: Write SSH key
            env:
              SSH_KEY: ${{ secrets.SSH_PRIVATE_KEY }}
            run: |
              mkdir -p ~/.ssh
              printf '%s\n' "$SSH_KEY" > ~/.ssh/deploy_key
              chmod 600 ~/.ssh/deploy_key
          - name: Wait for EC2 SSH ready
            run: |
              EC2_IP="${{ needs.provision-ec2.outputs.ec2_ip }}"
              echo "Waiting for SSH on $EC2_IP..."
              for i in $(seq 1 30); do
                if ssh -i ~/.ssh/deploy_key \
                     -o StrictHostKeyChecking=no \
                     -o ConnectTimeout=5 \
                     ubuntu@"$EC2_IP" "echo ready" 2>/dev/null; then
                  echo "SSH is up"
                  ssh-keyscan -H "$EC2_IP" >> ~/.ssh/known_hosts 2>/dev/null
                  break
                fi
                echo "Attempt $i/30 — waiting 10s..."
                sleep 10
              done
          - name: Idempotent setup — Android SDK + arm64 emulator + Maestro
            run: |
              EC2_IP="${{ needs.provision-ec2.outputs.ec2_ip }}"
              ssh -i ~/.ssh/deploy_key -o StrictHostKeyChecking=no ubuntu@"$EC2_IP" bash << 'ENDSSH'
                set -e
                export ANDROID_HOME=/opt/android-sdk
                SDKMANAGER="$ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager"
                AVDMANAGER="$ANDROID_HOME/cmdline-tools/latest/bin/avdmanager"
                ADB="$ANDROID_HOME/platform-tools/adb"
                export PATH="$ANDROID_HOME/cmdline-tools/latest/bin:$ANDROID_HOME/emulator:$ANDROID_HOME/platform-tools:$HOME/.maestro/bin:$PATH"

                # ── Java 17 ────────────────────────────────────────────────
                if ! java -version 2>&1 | grep -q '17'; then
                  export DEBIAN_FRONTEND=noninteractive
                  sudo apt-get update -qq
                  sudo apt-get install -y -qq openjdk-17-jdk wget unzip curl libpulse0 libnss3
                  echo "Java 17 installed"
                else
                  echo "Java 17 already present — skipping"
                fi

                # ── Android SDK command-line tools ─────────────────────────
                if [ ! -f "$ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager" ]; then
                  sudo mkdir -p "$ANDROID_HOME"
                  sudo chown -R ubuntu:ubuntu "$ANDROID_HOME"
                  cd /tmp
                  wget -q https://dl.google.com/android/repository/commandlinetools-linux-11076708_latest.zip \
                       -O cmdline-tools.zip
                  unzip -q cmdline-tools.zip -d /tmp/clt-extract
                  mv /tmp/clt-extract/cmdline-tools "$ANDROID_HOME/cmdline-tools/latest"
                  echo "Android SDK cmdline-tools installed"
                else
                  echo "Android SDK cmdline-tools already present — skipping"
                fi

                # ── arm64-v8a system image (the key idempotency gate) ──────
                # x86_64 requires KVM — not available on t3.large
                # arm64-v8a runs via QEMU TCG — no KVM needed
                ARM64_SYSIMG="$ANDROID_HOME/system-images/android-34/google_apis/arm64-v8a"
                if [ ! -d "$ARM64_SYSIMG" ]; then
                  echo "arm64-v8a system image not found — installing all SDK packages..."
                  sudo chown -R ubuntu:ubuntu "$ANDROID_HOME"
                  yes | "$SDKMANAGER" --licenses > /dev/null 2>&1 || true
                  "$SDKMANAGER" \
                    "platform-tools" \
                    "emulator" \
                    "platforms;android-34" \
                    "build-tools;34.0.0" \
                    "system-images;android-34;google_apis;arm64-v8a"
                  echo "arm64-v8a system image installed"
                else
                  echo "arm64-v8a system image already installed — skipping SDK install"
                fi

                # ── AVD: force arm64 — recreate if missing or pointing at x86_64 ──
                AVD_SYSDIR=$(grep 'image.sysdir' "$HOME/.android/avd/test_avd.avd/config.ini" 2>/dev/null || echo "none")
                if echo "$AVD_SYSDIR" | grep -q 'x86_64'; then
                  echo "Existing AVD uses x86_64 — recreating as arm64-v8a..."
                  "$AVDMANAGER" delete avd -n test_avd 2>/dev/null || true
                  AVD_SYSDIR="none"
                fi
                if ! "$AVDMANAGER" list avd 2>/dev/null | grep -q 'test_avd'; then
                  echo "no" | "$AVDMANAGER" create avd \
                    -n test_avd \
                    -k "system-images;android-34;google_apis;arm64-v8a" \
                    --device "pixel_4" \
                    --force
                  echo "AVD test_avd created (arm64-v8a)"
                else
                  echo "AVD test_avd (arm64-v8a) already exists — skipping"
                fi

                # ── Emulator: start only if not already running ────────────
                DEVICES=$("$ADB" devices 2>/dev/null | grep -v "List of" | grep -v "^$" | grep "emulator" || true)
                if [ -z "$DEVICES" ]; then
                  echo "Starting arm64 emulator (QEMU TCG — no KVM required)..."
                  nohup "$ANDROID_HOME/emulator/emulator" \
                    -avd test_avd \
                    -no-window \
                    -no-audio \
                    -no-boot-anim \
                    -memory 3072 \
                    -gpu swiftshader_indirect \
                    > /tmp/emulator.log 2>&1 &
                  echo "Waiting for emulator boot (up to 15 min)..."
                  for i in $(seq 1 90); do
                    BOOT=$("$ADB" shell getprop sys.boot_completed 2>/dev/null | tr -d '\r' || true)
                    if [ "$BOOT" = "1" ]; then
                      echo "Emulator booted after $((i * 10))s"
                      "$ADB" shell input keyevent 82
                      break
                    fi
                    if [ "$i" = "90" ]; then
                      echo "ERROR: Emulator did not boot within 15 minutes"
                      tail -30 /tmp/emulator.log
                      exit 1
                    fi
                    echo "Boot check $i/90..."
                    sleep 10
                  done
                else
                  echo "Emulator already running: $DEVICES — skipping start"
                fi

                # ── Maestro ────────────────────────────────────────────────
                if [ ! -f "$HOME/.maestro/bin/maestro" ]; then
                  export MAESTRO_VERSION=1.39.0
                  curl -fsSL "https://get.maestro.mobile.dev" | bash
                  echo "Maestro installed"
                else
                  echo "Maestro already installed — skipping"
                fi
                echo "=== Setup complete ==="
              ENDSSH
          - name: Copy APK and Maestro flows to EC2
            run: |
              EC2_IP="${{ needs.provision-ec2.outputs.ec2_ip }}"
              ssh -i ~/.ssh/deploy_key -o StrictHostKeyChecking=no ubuntu@"$EC2_IP" \
                "mkdir -p /tmp/maestro"
              scp -i ~/.ssh/deploy_key -o StrictHostKeyChecking=no \
                app/build/outputs/apk/debug/app-debug.apk ubuntu@"$EC2_IP":/tmp/app-debug.apk
              scp -i ~/.ssh/deploy_key -o StrictHostKeyChecking=no \
                -r maestro/ ubuntu@"$EC2_IP":/tmp/maestro/
          - name: Run Maestro tests with screen recording
            run: |
              EC2_IP="${{ needs.provision-ec2.outputs.ec2_ip }}"
              ssh -i ~/.ssh/deploy_key -o StrictHostKeyChecking=no ubuntu@"$EC2_IP" bash << 'ENDSSH'
                set -e
                export ANDROID_HOME=/opt/android-sdk
                export PATH="$ANDROID_HOME/platform-tools:$ANDROID_HOME/emulator:$HOME/.maestro/bin:$PATH"
                ADB="$ANDROID_HOME/platform-tools/adb"

                # Reinstall APK fresh each run
                "$ADB" uninstall com.example.kotlintodo 2>/dev/null || true
                "$ADB" install /tmp/app-debug.apk

                # Stop any previous recording
                "$ADB" shell pkill -f screenrecord 2>/dev/null || true
                sleep 1

                # Start screen recording
                "$ADB" shell screenrecord /sdcard/ui-test-recording.mp4 &
                RECORD_PID=$!
                echo "Screen recording started (PID $RECORD_PID)"

                # Run all Maestro flows
                maestro test /tmp/maestro/ --output /tmp/maestro-report.xml || MAESTRO_EXIT=$?

                # Stop recording gracefully
                sleep 2
                kill $RECORD_PID 2>/dev/null || true
                sleep 3

                # Pull recording from device
                "$ADB" pull /sdcard/ui-test-recording.mp4 /tmp/ui-test-recording.mp4 || true

                echo "All tests complete"
                exit ${MAESTRO_EXIT:-0}
              ENDSSH
          - name: Pull artifacts from EC2
            run: |
              EC2_IP="${{ needs.provision-ec2.outputs.ec2_ip }}"
              mkdir -p ui-test-artifacts
              scp -i ~/.ssh/deploy_key -o StrictHostKeyChecking=no \
                ubuntu@"$EC2_IP":/tmp/ui-test-recording.mp4 ui-test-artifacts/ || true
              scp -i ~/.ssh/deploy_key -o StrictHostKeyChecking=no \
                ubuntu@"$EC2_IP":/tmp/maestro-report.xml ui-test-artifacts/ || true
          - name: Upload UI test artifacts
            uses: actions/upload-artifact@v4
            with:
              name: ui-test-results
              path: ui-test-artifacts/
              retention-days: 30
              if-no-files-found: warn

      - id: destroy-ec2
        kind: custom
        needs: [run-ui-tests]
        timeout_minutes: 10
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          AWS_REGION: us-east-1
          TF_VAR_project_name: ${{ secrets.PROJECT_NAME }}
          TF_VAR_ssh_public_key: ${{ secrets.SSH_PUBLIC_KEY }}
        steps:
          - name: Only destroy on test success
            run: echo "Tests passed — destroying EC2 now"
          - name: Set up Terraform
            uses: hashicorp/setup-terraform@v3
            with:
              terraform_version: "1.7.5"
          - name: Terraform Init
            working-directory: infra/uitest
            run: |
              terraform init -input=false -reconfigure \
                -backend-config="bucket=${{ secrets.TF_STATE_BUCKET }}" \
                -backend-config="key=${{ secrets.PROJECT_NAME }}/uitest/terraform.tfstate" \
                -backend-config="region=us-east-1"
          - name: Terraform Destroy
            working-directory: infra/uitest
            run: terraform destroy -input=false -auto-approve
