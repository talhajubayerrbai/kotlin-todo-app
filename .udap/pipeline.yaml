version: 1
name: kotlin-todo-app
vcs: github

rollback:
  strategy: none

stages:
  - id: lint
    kind: lint
    needs: []
    timeout_minutes: 20
    env:
      ANDROID_HOME: /usr/local/lib/android/sdk
      ANDROID_SDK_ROOT: /usr/local/lib/android/sdk
    steps:
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: "17"
          distribution: temurin
      - name: Accept Android SDK licenses
        run: yes | sdkmanager --licenses
        env:
          ANDROID_HOME: /usr/local/lib/android/sdk
          ANDROID_SDK_ROOT: /usr/local/lib/android/sdk
      - name: Install Android platform 34 and build-tools
        run: sdkmanager "platforms;android-34" "build-tools;34.0.0"
        env:
          ANDROID_HOME: /usr/local/lib/android/sdk
          ANDROID_SDK_ROOT: /usr/local/lib/android/sdk
      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4
      - name: Grant execute permission for gradlew
        run: chmod +x gradlew
      - name: Run Android Lint
        run: ./gradlew lintDebug --stacktrace
      - name: Upload Lint Report
        uses: actions/upload-artifact@v4
        with:
          name: lint-report
          path: app/build/reports/lint-results-debug.html
          if-no-files-found: warn

  - id: test
    kind: test
    needs: [lint]
    timeout_minutes: 20
    env:
      ANDROID_HOME: /usr/local/lib/android/sdk
      ANDROID_SDK_ROOT: /usr/local/lib/android/sdk
    steps:
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: "17"
          distribution: temurin
      - name: Accept Android SDK licenses
        run: yes | sdkmanager --licenses
        env:
          ANDROID_HOME: /usr/local/lib/android/sdk
          ANDROID_SDK_ROOT: /usr/local/lib/android/sdk
      - name: Install Android platform 34 and build-tools
        run: sdkmanager "platforms;android-34" "build-tools;34.0.0"
        env:
          ANDROID_HOME: /usr/local/lib/android/sdk
          ANDROID_SDK_ROOT: /usr/local/lib/android/sdk
      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4
      - name: Grant execute permission for gradlew
        run: chmod +x gradlew
      - name: Run Unit Tests
        run: ./gradlew test --stacktrace
      - name: Upload Test Results
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: app/build/reports/tests/
          if-no-files-found: warn

  - id: provision
    kind: provision
    needs: [test]
    timeout_minutes: 5
    steps:
      - name: No-op provision (CI-only project)
        run: echo "No cloud infrastructure required for this project"

  - id: configure
    kind: configure
    needs: [provision]
    timeout_minutes: 25
    env:
      ANDROID_HOME: /usr/local/lib/android/sdk
      ANDROID_SDK_ROOT: /usr/local/lib/android/sdk
    steps:
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: "17"
          distribution: temurin
      - name: Accept Android SDK licenses
        run: yes | sdkmanager --licenses
        env:
          ANDROID_HOME: /usr/local/lib/android/sdk
          ANDROID_SDK_ROOT: /usr/local/lib/android/sdk
      - name: Install Android platform 34 and build-tools
        run: sdkmanager "platforms;android-34" "build-tools;34.0.0"
        env:
          ANDROID_HOME: /usr/local/lib/android/sdk
          ANDROID_SDK_ROOT: /usr/local/lib/android/sdk
      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4
      - name: Grant execute permission for gradlew
        run: chmod +x gradlew
      - name: Build Debug APK
        run: ./gradlew assembleDebug --stacktrace
      - name: Upload Debug APK
        uses: actions/upload-artifact@v4
        with:
          name: kotlin-todo-app-debug
          path: app/build/outputs/apk/debug/app-debug.apk
          retention-days: 30

  - id: verify
    kind: verify
    needs: [configure]
    timeout_minutes: 5
    steps:
      - name: Download APK artifact
        uses: actions/download-artifact@v4
        with:
          name: kotlin-todo-app-debug
          path: apk-download
      - name: Verify APK exists
        run: |
          APK_PATH="apk-download/app-debug.apk"
          if [ ! -f "$APK_PATH" ]; then
            echo "ERROR: Debug APK not found at $APK_PATH"
            exit 1
          fi
          echo "APK size: $(du -sh $APK_PATH | cut -f1)"
          echo "Build artifact verified successfully"
          ls -lh apk-download/
