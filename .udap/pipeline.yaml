version: 1
name: kotlin-todo-app
vcs: github

rollback:
  strategy: none

stages:
  - id: lint
    kind: lint
    needs: []
    timeout_minutes: 20
    env:
      ANDROID_HOME: /usr/local/lib/android/sdk
      ANDROID_SDK_ROOT: /usr/local/lib/android/sdk
    steps:
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: "17"
          distribution: temurin
      - name: Download Gradle wrapper jar
        run: |
          curl -fsSL -o gradle/wrapper/gradle-wrapper.jar \
            https://github.com/gradle/gradle/raw/v8.6.0/gradle/wrapper/gradle-wrapper.jar
          echo "Gradle wrapper jar downloaded: $(ls -lh gradle/wrapper/gradle-wrapper.jar)"
      - name: Accept Android SDK licenses and install platform
        run: |
          SDKMANAGER="/usr/local/lib/android/sdk/cmdline-tools/latest/bin/sdkmanager"
          yes | "$SDKMANAGER" --licenses
          "$SDKMANAGER" "platforms;android-34" "build-tools;34.0.0"
      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4
      - name: Grant execute permission for gradlew
        run: chmod +x gradlew
      - name: Compile Kotlin sources (lint check)
        run: ./gradlew compileDebugKotlin
      - name: Run Android Lint (non-blocking)
        run: ./gradlew lintDebug || echo "Lint completed (warnings may exist)"

  - id: test
    kind: test
    needs: [lint]
    timeout_minutes: 20
    env:
      ANDROID_HOME: /usr/local/lib/android/sdk
      ANDROID_SDK_ROOT: /usr/local/lib/android/sdk
    steps:
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: "17"
          distribution: temurin
      - name: Download Gradle wrapper jar
        run: |
          curl -fsSL -o gradle/wrapper/gradle-wrapper.jar \
            https://github.com/gradle/gradle/raw/v8.6.0/gradle/wrapper/gradle-wrapper.jar
          echo "Gradle wrapper jar downloaded: $(ls -lh gradle/wrapper/gradle-wrapper.jar)"
      - name: Accept Android SDK licenses and install platform
        run: |
          SDKMANAGER="/usr/local/lib/android/sdk/cmdline-tools/latest/bin/sdkmanager"
          yes | "$SDKMANAGER" --licenses
          "$SDKMANAGER" "platforms;android-34" "build-tools;34.0.0"
      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4
      - name: Grant execute permission for gradlew
        run: chmod +x gradlew
      - name: Run Unit Tests
        run: ./gradlew test
      - name: Upload Test Results
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: app/build/reports/tests/
          if-no-files-found: warn

  - id: provision
    kind: provision
    needs: [test]
    timeout_minutes: 5
    steps:
      - name: No-op provision (CI-only project)
        run: echo "No cloud infrastructure required for this project"

  - id: configure
    kind: configure
    needs: [provision]
    timeout_minutes: 25
    env:
      ANDROID_HOME: /usr/local/lib/android/sdk
      ANDROID_SDK_ROOT: /usr/local/lib/android/sdk
    steps:
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: "17"
          distribution: temurin
      - name: Download Gradle wrapper jar
        run: |
          curl -fsSL -o gradle/wrapper/gradle-wrapper.jar \
            https://github.com/gradle/gradle/raw/v8.6.0/gradle/wrapper/gradle-wrapper.jar
          echo "Gradle wrapper jar downloaded: $(ls -lh gradle/wrapper/gradle-wrapper.jar)"
      - name: Accept Android SDK licenses and install platform
        run: |
          SDKMANAGER="/usr/local/lib/android/sdk/cmdline-tools/latest/bin/sdkmanager"
          yes | "$SDKMANAGER" --licenses
          "$SDKMANAGER" "platforms;android-34" "build-tools;34.0.0"
      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4
      - name: Grant execute permission for gradlew
        run: chmod +x gradlew
      - name: Build Debug APK
        run: ./gradlew assembleDebug
      - name: Upload Debug APK
        uses: actions/upload-artifact@v4
        with:
          name: kotlin-todo-app-debug
          path: app/build/outputs/apk/debug/app-debug.apk
          retention-days: 30

  - id: verify
    kind: verify
    needs: [configure]
    timeout_minutes: 5
    steps:
      - name: Download APK artifact
        uses: actions/download-artifact@v4
        with:
          name: kotlin-todo-app-debug
          path: apk-download
      - name: Verify APK exists
        run: |
          APK_PATH="apk-download/app-debug.apk"
          if [ ! -f "$APK_PATH" ]; then
            echo "ERROR: Debug APK not found at $APK_PATH"
            exit 1
          fi
          echo "APK size: $(du -sh $APK_PATH | cut -f1)"
          echo "Build artifact verified successfully"
          ls -lh apk-download/
